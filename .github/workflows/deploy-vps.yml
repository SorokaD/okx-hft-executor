# Деплой на VPS при push в main, только если менялся код сервиса (не docs).
# Секреты: Settings → Secrets and variables → Actions → Repository secrets
#   VPS_SSH_HOST, VPS_SSH_USER, VPS_SSH_PRIVATE_KEY
#   VPS_DEPLOY_PATH (например /opt/okx-hft-executor/okx-hft-executor)
#
# Документация: docs/deployment_cicd.md

name: Deploy VPS

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - config/**
      - control/**
      - domain/**
      - strategy/**
      - execution/**
      - risk/**
      - exchange/**
      - persistence/**
      - accounting/**
      - services/**
      - observability/**
      - docker-compose.yml
      - Dockerfile
      - pyproject.toml
      - .dockerignore
      - .github/workflows/deploy-vps.yml
  workflow_dispatch:

concurrency:
  group: deploy-vps-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          envs: DEPLOY_PATH
          script: |
            set -euxo pipefail

            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "ERROR: secret VPS_DEPLOY_PATH is empty"
              exit 1
            fi

            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              echo "ERROR: ${DEPLOY_PATH} is not a git repo (no .git)"
              exit 1
            fi

            cd "${DEPLOY_PATH}"
            echo "Deploy path: $(pwd)"
            git remote -v
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline

            test -f .env || { echo "ERROR: .env missing on server"; exit 1; }

            # docker без sudo или с sudo (на VPS часто нужен sudo)
            if docker ps >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="sudo docker compose"
            fi

            $DC pull 2>/dev/null || true
            $DC up -d --build
            $DC ps
            $DC exec -T executor python -m app.main --dry-run
